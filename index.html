<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boğaziçi Havayolları — Uçuş Operasyon Merkezi</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
<link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
<header id="topbar">
  <div class="brand">✈ BOĞAZİÇİ HAVAYOLLARI <span>Uçuş Operasyon Merkezi</span></div>
  <div id="clock">—</div>
  <div class="speed-controls">
    <button data-speed="0" title="Duraklat">⏸</button>
    <button data-speed="1">1 dk/sn</button>
    <button data-speed="5" class="active">5 dk/sn</button>
    <button data-speed="15">15 dk/sn</button>
  </div>
  <div id="stats"></div>
</header>
<main>
  <aside id="left">
    <h2>Uçuşlar</h2>
    <div id="flight-list" class="scroll"></div>
    <h2>Filo</h2>
    <div id="fleet-list" class="scroll"></div>
  </aside>
  <section id="map-wrap"><canvas id="map"></canvas>
    <div id="legend">
      <span><i class="dot ts"></i>Oraj</span>
      <span><i class="dot turb"></i>Türbülans</span>
      <span><i class="dot ice"></i>Buzlanma</span>
      <span><i class="dot fog"></i>≋ Düşük görüş</span>
    </div>
  </section>
  <aside id="right">
    <h2>Uçuş Detayı</h2>
    <div id="detail-body"></div>
    <h2>Operasyon Günlüğü</h2>
    <div id="log" class="scroll"></div>
  </aside>
</main>
<script src="js/data.js"></script>
<script src="js/worldmap.js"></script>
<script src="js/geo.js"></script>
<script src="js/geodata.js"></script>
<script src="js/weather.js"></script>
<script src="js/flight.js"></script>
<script src="js/advisor.js"></script>
<script src="js/sim.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
